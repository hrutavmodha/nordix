name: Publish to npm

on:
    push:
        branches:
            - main
    workflow_dispatch: {}

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                registry-url: 'https://registry.npmjs.org/'

            - name: Install dependencies
              run: npm install

            - name: Build
              run: npm run build --if-present